name: OpenMAPS Bot

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  respond:
    runs-on: ubuntu-latest
    steps:
      - name: Check if authorized
        id: check
        run: |
          if [ "${{ github.event.sender.login }}" == "bcajales" ]; then
            echo "authorized=true" >> $GITHUB_OUTPUT
          else
            echo "authorized=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Extract query
        if: steps.check.outputs.authorized == 'true'
        id: query
        run: |
          if [ "${{ github.event_name }}" == "issues" ]; then
            TEXT="${{ github.event.issue.title }} ${{ github.event.issue.body }}"
            NUMBER="${{ github.event.issue.number }}"
          else
            TEXT="${{ github.event.comment.body }}"
            NUMBER="${{ github.event.issue.number }}"
          fi
          echo "text=$TEXT" >> $GITHUB_OUTPUT
          echo "number=$NUMBER" >> $GITHUB_OUTPUT
      
      - name: Call Dify
        if: steps.check.outputs.authorized == 'true'
        id: dify
        run: |
          RESPONSE=$(curl -s -X POST https://api.dify.ai/v1/workflows/run \
            -H "Authorization: Bearer ${{ secrets.DIFY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"inputs\":{\"payload\":\"${{ steps.query.outputs.text }}\"},\"response_mode\":\"blocking\",\"user\":\"github\"}")
          
          echo "$RESPONSE" > /tmp/response.json
          
          ANSWER=$(echo "$RESPONSE" | jq -r '.data.outputs.respuesta_validador // .data.outputs.respuesta_redactor // .data.outputs.respuesta_github // .data.outputs.respuesta_depurador // .data.outputs.respuesta_seguridad // .data.outputs.respuesta_architect // .data.outputs.respuesta_investigador // .data.outputs.respuesta_integracion // .data.outputs.respuesta_rendimiento // "Error: no se pudo extraer respuesta"')
          AGENTE=$(echo "$RESPONSE" | jq -r '.data.outputs.agente_usado // "desconocido"')
          
          echo "answer=$ANSWER" >> $GITHUB_OUTPUT
          echo "agente=$AGENTE" >> $GITHUB_OUTPUT
      
      - name: Post response
        if: steps.check.outputs.authorized == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const answer = `${{ steps.dify.outputs.answer }}`;
            const agente = `${{ steps.dify.outputs.agente }}`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.query.outputs.number }},
              body: `🤖 **OpenMAPS Bot** (agente: \`${agente}\`)\n\n${answer}`
            });
