name: OpenMAPS Bot

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  respond:
    runs-on: ubuntu-latest
    steps:
      - name: Check authorization and rate limit
        id: check
        run: |
          # Tú (owner) siempre autorizado sin límites
          if [ "${{ github.event.sender.login }}" == "bcajales" ]; then
            echo "authorized=true" >> $GITHUB_OUTPUT
            echo "reason=owner" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Para otros usuarios: máximo 3 Issues en la última hora
          RECENT_ISSUES=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/issues?creator=${{ github.event.sender.login }}&since=$(date -u -d '1 hour ago' +%Y-%m-%dT%H:%M:%SZ)" \
            | jq '. | length')
          
          echo "User ${{ github.event.sender.login }} has created $RECENT_ISSUES issues in the last hour"
          
          if [ "$RECENT_ISSUES" -le 3 ]; then
            echo "authorized=true" >> $GITHUB_OUTPUT
            echo "reason=within_limit" >> $GITHUB_OUTPUT
          else
            echo "authorized=false" >> $GITHUB_OUTPUT
            echo "reason=rate_limit_exceeded" >> $GITHUB_OUTPUT
          fi
      
      - name: Post rate limit message
        if: steps.check.outputs.authorized == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.eventName === 'issues' ? 
              context.payload.issue.number : 
              context.payload.issue.number;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: '⚠️ **Límite de consultas excedido**\n\nHas alcanzado el máximo de 3 consultas por hora. Por favor, intenta nuevamente más tarde.\n\nSi necesitas asistencia urgente, puedes revisar la [documentación](https://github.com/bcajales/openmaps-standard/tree/main/docs).'
            });
      
      - name: Call Dify and Post
        if: steps.check.outputs.authorized == 'true'
        uses: actions/github-script@v7
        env:
          DIFY_KEY: ${{ secrets.DIFY_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            let query = '';
            let issueNumber = 0;
            
            if (context.eventName === 'issues') {
              query = context.payload.issue.title + ' ' + context.payload.issue.body;
              issueNumber = context.payload.issue.number;
            } else if (context.eventName === 'issue_comment') {
              query = context.payload.comment.body;
              issueNumber = context.payload.issue.number;
            }
            
            const response = await fetch('https://api.dify.ai/v1/workflows/run', {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer ' + process.env.DIFY_KEY,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                inputs: { payload: query },
                response_mode: 'blocking',
                user: 'github'
              })
            });
            
            const data = await response.json();
            console.log('Dify response:', JSON.stringify(data, null, 2));
            
            const outputs = data.data?.outputs || {};
            const answer = outputs.respuesta_validador ||
                          outputs.respuesta_redactor ||
                          outputs.respuesta_github ||
                          outputs.respuesta_depurador ||
                          outputs.respuesta_seguridad ||
                          outputs.respuesta_architect ||
                          outputs.respuesta_investigador ||
                          outputs.respuesta_integracion ||
                          outputs.respuesta_rendimiento ||
                          'Error: no se pudo extraer respuesta';
            
            const agente = outputs.agente_usado || 'desconocido';
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: '🤖 **OpenMAPS Bot** (agente: `' + agente + '`)\n\n' + answer
            });
