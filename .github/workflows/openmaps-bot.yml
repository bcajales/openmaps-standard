name: OpenMAPS Bot

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  respond:
    runs-on: ubuntu-latest
    steps:
      - name: Check if authorized
        id: check
        run: |
          if [ "${{ github.event.sender.login }}" == "bcajales" ]; then
            echo "authorized=true" >> $GITHUB_OUTPUT
          else
            echo "authorized=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Call Dify and Post
        if: steps.check.outputs.authorized == 'true'
        uses: actions/github-script@v7
        env:
          DIFY_KEY: ${{ secrets.DIFY_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            let query = '';
            let issueNumber = 0;
            
            if (context.eventName === 'issues') {
              query = context.payload.issue.title + ' ' + context.payload.issue.body;
              issueNumber = context.payload.issue.number;
            } else if (context.eventName === 'issue_comment') {
              query = context.payload.comment.body;
              issueNumber = context.payload.issue.number;
            }
            
            const response = await fetch('https://api.dify.ai/v1/workflows/run', {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer ' + process.env.DIFY_KEY,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                inputs: { payload: query },
                response_mode: 'blocking',
                user: 'github'
              })
            });
            
            const data = await response.json();
            console.log('Dify response:', JSON.stringify(data, null, 2));
            
            const outputs = data.data?.outputs || {};
            const answer = outputs.respuesta_validador ||
                          outputs.respuesta_redactor ||
                          outputs.respuesta_github ||
                          outputs.respuesta_depurador ||
                          outputs.respuesta_seguridad ||
                          outputs.respuesta_architect ||
                          outputs.respuesta_investigador ||
                          outputs.respuesta_integracion ||
                          outputs.respuesta_rendimiento ||
                          'Error: no se pudo extraer respuesta';
            
            const agente = outputs.agente_usado || 'desconocido';
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: '🤖 **OpenMAPS Bot** (agente: `' + agente + '`)\n\n' + answer
            });
