<svg width="100%" viewBox="0 0 680 390" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
  text { font-family: system-ui, sans-serif; fill: #1a1a1a; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
  .col-header { font-size: 11px; font-weight: 500; fill: #666; text-transform: uppercase; letter-spacing: 0.05em; }

  .bg-teal      { fill: #E1F5EE; stroke: #0F6E56; }
  .bg-purple    { fill: #EEEDFE; stroke: #534AB7; }
  .bg-blue      { fill: #E6F1FB; stroke: #185FA5; }
  .bg-amber     { fill: #FAEEDA; stroke: #854F0B; }
  .bg-gray      { fill: #F1EFE8; stroke: #5F5E5A; }
  .text-teal    { fill: #085041; }
  .text-purple  { fill: #3C3489; }
  .text-blue    { fill: #0C447C; }
  .text-amber   { fill: #633806; }
  .text-gray    { fill: #444441; }

  .inner-box    { fill: #fff; stroke: #C4C2B8; stroke-width: 0.5; }
  .inner-text   { fill: #3d3d3a; }
  .arr          { stroke: #3d3d3a; stroke-width: 1.5; fill: none; }
  .arr-dashed   { stroke: #888780; stroke-width: 1.5; fill: none; stroke-dasharray: 5 3; }
  .legend-line  { stroke: #3d3d3a; stroke-width: 1.5; fill: none; }
  .legend-dash  { stroke: #888780; stroke-width: 1.5; fill: none; stroke-dasharray: 5 3; }
  .divider      { stroke: #C4C2B8; stroke-width: 0.5; }
</style>
</defs>

<!-- Column headers -->
